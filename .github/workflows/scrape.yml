name: Scrape Backstage Ranking

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub Actions minimum)
  workflow_dispatch:          # allow manual runs

# Prevent overlapping runs
concurrency:
  group: scrape
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Restore storage state from secret (gzip+base64)
        run: echo "${{ secrets.SESSION_STATE_B64 }}" | base64 -d | gunzip > storage_state.json
        shell: bash

      - name: Run scraper
        env:
          OUTPUT_DIR: out
          HEADLESS: "1"
        run: python3 scrape.py

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          pip install awscli
          aws s3 cp out/ranking_realtime_livers.json  s3://$R2_BUCKET/ranking_realtime_livers.json  --endpoint-url "$R2_ENDPOINT" --content-type "application/json; charset=utf-8" --cache-control "public, max-age=30"
          aws s3 cp out/ranking_realtime_internal.json s3://$R2_BUCKET/ranking_realtime_internal.json --endpoint-url "$R2_ENDPOINT" --content-type "application/json; charset=utf-8" --cache-control "public, max-age=30"

