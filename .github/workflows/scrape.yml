name: Scrape Backstage Ranking

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub Actions minimum)
  workflow_dispatch:          # allow manual runs

# Prevent overlapping runs
concurrency:
  group: scrape
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Restore storage state — alpha (required)
        run: echo "${{ secrets.SESSION_STATE_B64 }}" | base64 -d | gunzip > storage_state.json
        shell: bash

      - name: Restore storage state — ulysses (optional)
        env:
          ULYSSES: ${{ secrets.SESSION_STATE_ULYSSES_B64 }}
        run: |
          if [ -n "$ULYSSES" ]; then
            echo "$ULYSSES" | base64 -d | gunzip > storage_state_ulysses.json
            echo "ulysses session restored"
          else
            echo "ulysses session not configured yet — scraper will skip"
          fi
        shell: bash

      - name: Run scraper (both livers and internal feeds)
        env:
          OUTPUT_DIR: docs
          HEADLESS: "1"
        run: python3 scrape.py

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update ranking $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Retry push with rebase on conflict (concurrent runs can race)
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push failed attempt $i, rebasing and retrying…"
            git pull --rebase origin main
            sleep 2
          done
          echo "Push failed after 5 attempts"
          exit 1

