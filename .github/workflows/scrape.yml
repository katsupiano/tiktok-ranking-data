name: Scrape Backstage Ranking

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub Actions minimum)
  workflow_dispatch:          # allow manual runs

# Prevent overlapping runs
concurrency:
  group: scrape
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Restore storage state from secret
        run: echo "${{ secrets.SESSION_STATE_B64 }}" | base64 -d > storage_state.json
        shell: bash

      - name: Run scraper
        env:
          OUTPUT_DIR: docs
          HEADLESS: "1"
        run: python3 scrape.py

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update ranking $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
